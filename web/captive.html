<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Network Not Configured</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,sans-serif;background:#0d1117;color:#e6edf3;display:flex;align-items:center;justify-content:center;min-height:100vh}
.box{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:48px;max-width:480px;text-align:center}
.icon{font-size:64px;margin-bottom:20px}
h1{font-size:22px;margin-bottom:12px;color:#f85149}
p{font-size:15px;color:#8b949e;line-height:1.6;margin-bottom:16px}
.highlight{color:#58a6ff}
.badge{display:inline-block;background:#1b4332;color:#3fb950;padding:4px 12px;border-radius:20px;font-size:13px;margin-top:8px}
</style>
</head>
<body>
<div class="box">
  <div class="icon">&#128274;</div>
  <h1>Network Not Configured</h1>
  <p>This device has not been configured for internet access.</p>
  <p>You have <span class="highlight">local network access only</span> (LAN, NAS, printers).</p>
  <p>Please contact the network administrator to enable access.</p>
  <div class="badge">LAN Only Mode</div>
</div>
</body>
</html>

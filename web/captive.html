<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>设备待授权 - MACFlow</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%233b82f6'/><rect x='6' y='6' width='20' height='20' rx='4' fill='none' stroke='white' stroke-width='2'/><circle cx='16' cy='16' r='4' fill='white'/></svg>"/>
<style>
:root{
  --font-ui:"IBM Plex Sans","Noto Sans SC","PingFang SC","Microsoft YaHei","Segoe UI",sans-serif;
  --font-mono:"JetBrains Mono","Cascadia Mono",Consolas,"Liberation Mono",monospace;
  --bg-base:#060a10;
  --bg-backdrop-1:radial-gradient(980px 460px at 12% -16%,#12304a58 0%,transparent 63%);
  --bg-backdrop-2:radial-gradient(900px 430px at 92% -14%,#154e7542 0%,transparent 66%);
  --surface-1:#0d131c;
  --surface-2:#0a0f17;
  --surface-3:#101924;
  --line-1:#1a2435;
  --line-2:#33435e;
  --text-1:#d7e0ed;
  --text-2:#9fb0c8;
  --text-3:#73839a;
  --accent:#3b82f6;
  --accent-2:#06b6d4;
  --ok:#22c55e;
  --warn:#f59e0b;
  --danger:#ef4444;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:var(--font-ui);
  background:var(--bg-backdrop-1),var(--bg-backdrop-2),var(--bg-base);
  color:var(--text-1);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:22px;
  line-height:1.55;
}
.shell{
  width:min(920px,100%);
  background:linear-gradient(168deg,var(--surface-1),var(--surface-2));
  border:1px solid var(--line-1);
  border-radius:20px;
  padding:24px;
  box-shadow:0 22px 54px rgba(0,0,0,.38);
  position:relative;
  overflow:hidden;
}
.shell::before{
  content:"";
  position:absolute;
  top:-56px;
  right:-46px;
  width:240px;
  height:240px;
  border-radius:50%;
  background:radial-gradient(circle,var(--accent) 0%,transparent 72%);
  opacity:.2;
  pointer-events:none;
}
.hero{display:flex;align-items:flex-start;gap:14px;margin-bottom:18px}
.hero-icon{
  width:62px;
  height:62px;
  border-radius:18px;
  border:1px solid var(--line-2);
  background:linear-gradient(145deg,var(--surface-3),var(--surface-2));
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:32px;
  flex-shrink:0;
}
.hero-copy h1{font-size:26px;line-height:1.22;letter-spacing:.2px}
.hero-copy p{margin-top:4px;font-size:14px;color:var(--text-3)}
.status-row{margin-top:10px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.status-chip{
  display:inline-flex;
  align-items:center;
  border:1px solid var(--line-2);
  border-radius:999px;
  padding:5px 11px;
  font-size:12px;
  font-weight:760;
  letter-spacing:.2px;
  background:var(--surface-2);
  color:var(--text-2);
}
.status-chip.ok{color:#4ade80;border-color:#16a34a66;background:#052012}
.status-chip.warn{color:#facc15;border-color:#eab30866;background:#261a07}
.status-chip.danger{color:#f87171;border-color:#ef444466;background:#2a0e12}
.status-chip.info{color:#7dd3fc;border-color:#0ea5e966;background:#082236}
.preview-chip{
  display:inline-flex;
  align-items:center;
  border:1px solid var(--line-2);
  border-radius:999px;
  padding:5px 10px;
  font-size:12px;
  color:var(--text-2);
  background:var(--surface-2);
}

.theme-bar{
  margin:0 0 14px;
  padding:10px 12px;
  border:1px solid var(--line-1);
  border-radius:12px;
  background:var(--surface-2);
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
}
.theme-meta{display:grid;gap:2px}
.theme-meta b{font-size:12px;color:var(--text-2);letter-spacing:.6px;text-transform:uppercase}
.theme-meta span{font-size:12px;color:var(--text-3)}
.theme-swatches{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:5px;min-width:224px}
.theme-swatch{
  appearance:none;
  border:1px solid var(--line-2);
  border-radius:6px;
  height:14px;
  background:linear-gradient(135deg,var(--sw1),var(--sw2) 55%,var(--sw3));
  cursor:pointer;
  opacity:.9;
  transition:.14s;
}
.theme-swatch:hover{opacity:1;transform:translateY(-1px)}
.theme-swatch.active{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent) inset}

.panels{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.panel{
  border:1px solid var(--line-1);
  border-radius:14px;
  background:linear-gradient(160deg,var(--surface-1),var(--surface-2));
  padding:14px;
  display:grid;
  gap:10px;
}
.panel h2{font-size:13px;text-transform:uppercase;letter-spacing:.7px;color:var(--text-2)}

.kv{display:grid;gap:8px}
.kv-row{display:grid;grid-template-columns:80px 1fr auto;align-items:center;gap:10px;padding:8px;border:1px solid var(--line-1);border-radius:10px;background:rgba(0,0,0,.08)}
.kv-row span{font-size:12px;color:var(--text-3)}
.kv-row code{font-family:var(--font-mono);font-size:12px;color:var(--text-1);word-break:break-all}

.step-list{display:grid;gap:8px}
.step-item{display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:10px;padding:8px;border:1px solid var(--line-1);border-radius:10px;background:rgba(0,0,0,.08)}
.step-no{width:21px;height:21px;border-radius:6px;border:1px solid var(--line-1);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:var(--text-1)}
.step-item strong{font-size:13px;color:var(--text-1)}
.step-item small{display:block;font-size:12px;color:var(--text-3)}
.step-state{font-size:12px;font-weight:760;padding:3px 9px;border-radius:999px;border:1px solid var(--line-1);color:var(--text-2)}
.step-item[data-state="ok"] .step-state{color:#4ade80;border-color:#16a34a66;background:#052012}
.step-item[data-state="warn"] .step-state{color:#facc15;border-color:#eab30866;background:#261a07}
.step-item[data-state="danger"] .step-state{color:#f87171;border-color:#ef444466;background:#2a0e12}
.step-item[data-state="info"] .step-state{color:#7dd3fc;border-color:#0ea5e966;background:#082236}

.action-row{margin-top:14px;display:flex;gap:10px;flex-wrap:wrap}
.btn{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  border-radius:10px;
  border:1px solid var(--line-2);
  background:var(--surface-2);
  color:var(--text-1);
  text-decoration:none;
  height:42px;
  padding:0 16px;
  font-size:14px;
  font-weight:760;
  cursor:pointer;
  transition:.14s;
}
.btn:hover{transform:translateY(-2px);filter:brightness(1.08);box-shadow:0 4px 16px rgba(0,0,0,.2)}
.btn:active{transform:translateY(0);filter:brightness(.95)}
.btn.primary{background:linear-gradient(135deg,var(--surface-3),var(--accent));border-color:color-mix(in srgb,var(--accent) 58%,var(--line-1));color:#fff}
.btn.success{background:linear-gradient(135deg,#15803d,#16a34a);border-color:#16a34a88;color:#fff}
.btn.ghost{background:transparent}
.btn.small{height:30px;padding:0 11px;font-size:12px}
.btn.loading{pointer-events:none;opacity:.7}
.btn.loading::after{content:"";display:inline-block;width:14px;height:14px;border:2px solid currentColor;border-top-color:transparent;border-radius:50%;animation:spin .6s linear infinite;margin-left:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.hidden{display:none!important}

/* Focus styles for accessibility */
:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:4px}

/* Smooth transitions for state changes */
.status-chip,.step-state{transition:color .3s,border-color .3s,background .3s}
.step-item{transition:border-color .3s}

/* Polling progress bar */
.poll-progress{position:absolute;bottom:0;left:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent-2));border-radius:0 0 20px 20px;transition:width linear}

/* Pulse animation for waiting states */
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.pulse{animation:pulse 2s ease-in-out infinite}

/* Hero icon animation */
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
.hero-icon{animation:float 3s ease-in-out infinite}

/* Success state celebration */
@keyframes checkmark{0%{transform:scale(0)}60%{transform:scale(1.15)}100%{transform:scale(1)}}
.hero-icon.authorized{animation:checkmark .4s ease-out forwards}

.status-line{margin-top:12px;font-size:13px;color:var(--text-2)}
.tip{margin-top:6px;font-size:12px;color:var(--text-3)}
.footer{margin-top:12px;font-size:12px;color:var(--text-3)}

body[data-theme="aurora"]{
  --bg-base:#060a10;--bg-backdrop-1:radial-gradient(980px 460px at 12% -16%,#12304a58 0%,transparent 63%);--bg-backdrop-2:radial-gradient(900px 430px at 92% -14%,#154e7542 0%,transparent 66%);
  --surface-1:#0d131c;--surface-2:#0a0f17;--surface-3:#101924;--line-1:#1a2435;--line-2:#33435e;--text-1:#d7e0ed;--text-2:#9fb0c8;--text-3:#73839a;--accent:#3b82f6;--accent-2:#06b6d4;
}
body[data-theme="dawn"]{
  --bg-base:#f5f8fc;--bg-backdrop-1:radial-gradient(930px 430px at 10% -18%,#fcd9b144 0%,transparent 66%);--bg-backdrop-2:radial-gradient(860px 410px at 96% -17%,#bae6fd55 0%,transparent 61%);
  --surface-1:#ffffff;--surface-2:#f8fbff;--surface-3:#edf3fa;--line-1:#d4dfec;--line-2:#93a8bf;--text-1:#1f2937;--text-2:#334155;--text-3:#64748b;--accent:#1e6db4;--accent-2:#0e7490;
}
body[data-theme="graphite"]{
  --bg-base:#101317;--bg-backdrop-1:radial-gradient(980px 430px at 16% -13%,#6b728033 0%,transparent 62%);--bg-backdrop-2:radial-gradient(860px 420px at 90% -16%,#3341553d 0%,transparent 66%);
  --surface-1:#171b20;--surface-2:#13171c;--surface-3:#1a1f25;--line-1:#2a323b;--line-2:#45505c;--text-1:#e2e8f0;--text-2:#cbd5e1;--text-3:#94a3b8;--accent:#5a8fff;--accent-2:#14b8a6;
}
body[data-theme="forest"]{
  --bg-base:#0a1110;--bg-backdrop-1:radial-gradient(980px 420px at 16% -12%,#065f4638 0%,transparent 62%);--bg-backdrop-2:radial-gradient(860px 420px at 88% -16%,#14532d44 0%,transparent 64%);
  --surface-1:#0f1916;--surface-2:#0c1412;--surface-3:#14211e;--line-1:#1f2f2a;--line-2:#35594f;--text-1:#d1fae5;--text-2:#a7f3d0;--text-3:#6ee7b7;--accent:#22c55e;--accent-2:#0ea5a2;
}
body[data-theme="sunset"]{
  --bg-base:#120b08;--bg-backdrop-1:radial-gradient(980px 430px at 16% -15%,#f9731630 0%,transparent 62%);--bg-backdrop-2:radial-gradient(860px 420px at 88% -18%,#fb923c2b 0%,transparent 66%);
  --surface-1:#1a120f;--surface-2:#140d0a;--surface-3:#231813;--line-1:#3a261d;--line-2:#5c3b2e;--text-1:#ffedd5;--text-2:#fdba74;--text-3:#c7865d;--accent:#f97316;--accent-2:#f59e0b;
}
body[data-theme="ocean"]{
  --bg-base:#07131b;--bg-backdrop-1:radial-gradient(980px 430px at 15% -12%,#0ea5e940 0%,transparent 63%);--bg-backdrop-2:radial-gradient(840px 420px at 90% -16%,#14b8a63d 0%,transparent 65%);
  --surface-1:#0d1d27;--surface-2:#0a151d;--surface-3:#132633;--line-1:#1f3644;--line-2:#315468;--text-1:#d7f2ff;--text-2:#a8ddf5;--text-3:#7cb8d2;--accent:#0ea5e9;--accent-2:#14b8a6;
}
body[data-theme="paper"]{
  --bg-base:#f8f6f1;--bg-backdrop-1:radial-gradient(980px 430px at 12% -16%,#f3e8d944 0%,transparent 66%);--bg-backdrop-2:radial-gradient(860px 420px at 90% -16%,#dbeafe55 0%,transparent 62%);
  --surface-1:#ffffff;--surface-2:#f7f4ee;--surface-3:#ede8df;--line-1:#d9cec0;--line-2:#bca993;--text-1:#2f2418;--text-2:#5a4632;--text-3:#866a4c;--accent:#b45309;--accent-2:#2563eb;
}

@media(max-width:860px){
  .shell{padding:18px}
  .panels{grid-template-columns:1fr}
}
@media(max-width:620px){
  body{padding:14px}
  .hero{flex-direction:column;align-items:flex-start}
  .theme-bar{flex-direction:column;align-items:flex-start}
  .theme-swatches{width:100%;min-width:0}
  .kv-row{grid-template-columns:66px 1fr}
  .kv-row .btn.small{grid-column:1/-1;width:100%}
  .action-row .btn{width:100%}
}
</style>
</head>
<body>
<main class="shell">
  <header class="hero">
    <div class="hero-icon">&#128274;</div>
    <div class="hero-copy">
      <h1 id="statusTitle">此设备正在等待管理员授权</h1>
      <p id="statusSubtitle">设备刚接入网络时会进入安全等待页，管理员完成纳管后自动放行。</p>
      <div class="status-row">
        <span id="statusChip" class="status-chip warn">等待授权</span>
        <span id="previewChip" class="preview-chip hidden">预览模式</span>
      </div>
    </div>
  </header>

  <div class="theme-bar">
    <div class="theme-meta">
      <b>界面主题</b>
      <span id="themeName">夜幕科技</span>
    </div>
    <div id="themeSwatches" class="theme-swatches" aria-label="主题色板"></div>
  </div>

  <section class="panels">
    <article class="panel">
      <h2>设备信息</h2>
      <div class="kv">
        <div class="kv-row"><span>设备名</span><code id="deviceName">{{DEVICE_NAME}}</code><button class="btn small ghost" onclick="copyValue(document.getElementById('deviceName').textContent,'设备名')">复制</button></div>
        <div class="kv-row"><span>MAC</span><code id="deviceMac">{{MAC}}</code><button class="btn small ghost" onclick="copyValue(document.getElementById('deviceMac').textContent,'MAC')">复制</button></div>
        <div class="kv-row"><span>IP</span><code id="deviceIp">{{IP}}</code><button class="btn small ghost" onclick="copyValue(document.getElementById('deviceIp').textContent,'IP')">复制</button></div>
        <div class="kv-row"><span>节点</span><code id="nodeHint">待分配</code></div>
      </div>
      <p class="tip">如果你是管理员，请在「设备分流」页将该设备绑定节点并应用策略。</p>
    </article>

    <article class="panel">
      <h2>接入流程</h2>
      <div class="step-list">
        <div id="stepDiscover" class="step-item" data-state="ok"><span class="step-no">1</span><div><strong>发现设备</strong><small>终端已接入局域网并识别身份</small></div><span id="stepDiscoverState" class="step-state">已完成</span></div>
        <div id="stepAssign" class="step-item" data-state="warn"><span class="step-no">2</span><div><strong>分配节点</strong><small>管理员需要在面板中完成纳管</small></div><span id="stepAssignState" class="step-state">待处理</span></div>
        <div id="stepApply" class="step-item" data-state="warn"><span class="step-no">3</span><div><strong>策略生效</strong><small>策略发布后设备将自动恢复公网访问</small></div><span id="stepApplyState" class="step-state">待发布</span></div>
      </div>
      <p class="tip">页面会自动轮询状态，无需手动反复刷新。</p>
    </article>
  </section>

  <div class="action-row">
    <a id="panelBtn" class="btn primary" href="{{PANEL_URL}}">打开管理面板</a>
    <button class="btn" onclick="pollStatus(true)">立即刷新状态</button>
    <button id="continueBtn" class="btn success hidden" onclick="location.reload()">已授权，刷新联网</button>
    <button class="btn ghost" onclick="copyBundle()">复制设备信息</button>
  </div>

  <p id="statusLine" class="status-line">状态同步中...</p>
  <div class="poll-progress" id="pollProgress" style="width:0%"></div>
  <p class="footer">Powered by MACFlow</p>
</main>

<script>
const DEVICE={
  name:'{{DEVICE_NAME}}',
  mac:'{{MAC}}',
  ip:'{{IP}}',
  panel:'{{PANEL_URL}}',
};
const PREF_THEME='macflow.ui.theme';
const POLL_SEC=5;
const THEMES={
  aurora:{name:'夜幕科技',swatch:['#3b82f6','#06b6d4','#1e3a5f']},
  dawn:{name:'晨光轻盈',swatch:['#1e6db4','#0e7490','#fcd9b1']},
  graphite:{name:'石墨专业',swatch:['#5a8fff','#14b8a6','#374151']},
  forest:{name:'林境安静',swatch:['#22c55e','#0ea5a2','#1f6f54']},
  sunset:{name:'暖橙能量',swatch:['#f97316','#f59e0b','#9a3412']},
  ocean:{name:'海湾清透',swatch:['#0ea5e9','#14b8a6','#0c7492']},
  paper:{name:'纸感极简',swatch:['#b45309','#2563eb','#ede8df']},
};

function sget(k,d){try{const v=localStorage.getItem(k);return v===null?d:v}catch(e){return d}}
function sset(k,v){try{localStorage.setItem(k,v)}catch(e){}}
function fmtNow(){return new Date().toLocaleTimeString('zh-CN',{hour12:false})}

function setStatusLine(text){
  const el=document.getElementById('statusLine');
  if(el)el.textContent=text;
}

async function apiGet(url){
  const r=await fetch(url,{cache:'no-store'});
  if(!r.ok)throw new Error(await r.text());
  return r.json();
}

function setTheme(theme){
  const t=THEMES[theme]?theme:'aurora';
  document.body.dataset.theme=t;
  sset(PREF_THEME,t);
  const nameEl=document.getElementById('themeName');
  if(nameEl)nameEl.textContent=(THEMES[t]||THEMES.aurora).name;
  document.querySelectorAll('.theme-swatch').forEach(btn=>btn.classList.toggle('active',btn.dataset.theme===t));
}

function renderThemeSwatches(){
  const wrap=document.getElementById('themeSwatches');
  if(!wrap)return;
  wrap.innerHTML='';
  Object.entries(THEMES).forEach(([id,meta])=>{
    const b=document.createElement('button');
    b.type='button';
    b.className='theme-swatch';
    b.dataset.theme=id;
    b.title=meta.name;
    b.style.setProperty('--sw1',(meta.swatch&&meta.swatch[0])||'#3b82f6');
    b.style.setProperty('--sw2',(meta.swatch&&meta.swatch[1])||'#06b6d4');
    b.style.setProperty('--sw3',(meta.swatch&&meta.swatch[2])||'#1e3a5f');
    b.addEventListener('click',()=>setTheme(id));
    wrap.appendChild(b);
  });
}

function setStep(id,state,text){
  const item=document.getElementById(id);
  const stateEl=document.getElementById(id+'State');
  if(item)item.dataset.state=state;
  if(stateEl)stateEl.textContent=text;
}

function setChip(state,text){
  const chip=document.getElementById('statusChip');
  if(!chip)return;
  chip.className='status-chip '+state;
  chip.textContent=text;
}

function applyStatus(data){
  if(data.device_name){document.getElementById('deviceName').textContent=data.device_name}
  if(data.mac){document.getElementById('deviceMac').textContent=data.mac}
  if(data.ip){document.getElementById('deviceIp').textContent=data.ip}
  if(data.node_tag){document.getElementById('nodeHint').textContent=data.node_tag}

  const title=document.getElementById('statusTitle');
  const sub=document.getElementById('statusSubtitle');
  const continueBtn=document.getElementById('continueBtn');
  const panelBtn=document.getElementById('panelBtn');
  if(panelBtn&&data.panel_url)panelBtn.href=data.panel_url;

  if(!data.service_enabled){
    setChip('info','服务未启用');
    if(title)title.textContent='当前未启用拦截策略';
    if(sub)sub.textContent='MACFlow 服务关闭时，终端不会被阻断，可直接正常上网。';
    setStep('stepDiscover','ok','已完成');
    setStep('stepAssign','ok','无需处理');
    setStep('stepApply','ok','无需发布');
    if(continueBtn)continueBtn.classList.add('hidden');
  }else if(data.managed){
    setChip('ok','已授权');
    if(title)title.textContent='设备已纳入策略管理';
    if(sub)sub.textContent='授权已生效，请等待 1-3 秒后重试联网。';
    const heroIcon=document.querySelector('.hero-icon');
    if(heroIcon){heroIcon.textContent='✅';heroIcon.classList.add('authorized');}
    setStep('stepDiscover','ok','已完成');
    setStep('stepAssign','ok',data.node_tag||'已分配');
    setStep('stepApply','ok','已生效');
    if(continueBtn)continueBtn.classList.remove('hidden');
  }else if(data.reason==='pending-apply'){
    setChip('warn','待应用');
    if(title)title.textContent='设备已录入，等待策略发布';
    if(sub)sub.textContent='管理员需在面板点击“全局应用”后，设备才会放行。';
    setStep('stepDiscover','ok','已完成');
    setStep('stepAssign','warn','已录入');
    setStep('stepApply','warn','等待发布');
    if(continueBtn)continueBtn.classList.add('hidden');
  }else{
    setChip('danger','未纳管');
    if(title)title.textContent='此设备尚未纳入分流策略';
    if(sub)sub.textContent='目前仅允许访问局域网，请联系管理员授权。';
    setStep('stepDiscover','ok','已完成');
    setStep('stepAssign','danger','待纳管');
    setStep('stepApply','warn','待发布');
    if(continueBtn)continueBtn.classList.add('hidden');
  }
}

let _pollTimer=null;
function startPollProgress(){
  const bar=document.getElementById('pollProgress');
  if(!bar)return;
  bar.style.transition='none';
  bar.style.width='0%';
  requestAnimationFrame(()=>{
    bar.style.transition=`width ${POLL_SEC}s linear`;
    bar.style.width='100%';
  });
}
async function pollStatus(manual){
  if(manual)setStatusLine('正在刷新状态...');
  const p=new URLSearchParams();
  if(DEVICE.ip&&DEVICE.ip!=='unknown')p.set('ip',DEVICE.ip);
  if(DEVICE.mac&&DEVICE.mac!=='unknown')p.set('mac',DEVICE.mac);
  try{
    const data=await apiGet('/api/captive/status?'+p.toString());
    applyStatus(data);
    setStatusLine(`最近检查: ${fmtNow()} · 每 ${POLL_SEC} 秒自动刷新`);
    startPollProgress();
  }catch(e){
    setStatusLine('状态获取失败，请稍后重试');
  }
}

async function copyValue(value,label){
  const text=String(value||'').trim();
  if(!text)return;
  try{
    if(navigator.clipboard&&navigator.clipboard.writeText){
      await navigator.clipboard.writeText(text);
      setStatusLine(`${label} 已复制`);
      return;
    }
  }catch(e){}
  const ta=document.createElement('textarea');
  ta.value=text;
  ta.style.position='fixed';
  ta.style.opacity='0';
  document.body.appendChild(ta);
  ta.select();
  try{document.execCommand('copy');setStatusLine(`${label} 已复制`)}catch(e){setStatusLine('复制失败，请手动复制')}
  ta.remove();
}

function copyBundle(){
  const lines=[
    `设备名: ${document.getElementById('deviceName').textContent||'-'}`,
    `MAC: ${document.getElementById('deviceMac').textContent||'-'}`,
    `IP: ${document.getElementById('deviceIp').textContent||'-'}`,
    `状态页: ${location.href}`,
  ];
  copyValue(lines.join('\n'),'设备信息');
}

const q=new URLSearchParams(location.search);
const preview=q.get('preview')==='1';
if(preview)document.getElementById('previewChip').classList.remove('hidden');
renderThemeSwatches();
setTheme(THEMES[q.get('theme')]?q.get('theme'):sget(PREF_THEME,'aurora'));
setStatusLine('状态同步中...');
pollStatus(false);
setInterval(()=>pollStatus(false),POLL_SEC*1000);
</script>
